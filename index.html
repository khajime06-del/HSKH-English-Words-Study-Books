<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSKH</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #e3f2fd, #90caf9);
}

.screen { display:none; min-height:100vh; padding:20px; box-sizing:border-box; }
.active { display:flex; flex-direction:column; align-items:center; }

.button {
  width:85%; max-width:320px;
  padding:15px; margin:10px;
  border-radius:20px;
  background:white;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input, select {
  width:85%; max-width:320px;
  padding:10px; margin:5px;
  border-radius:10px; border:none;
}

.card {
  width:90%; max-width:350px;
  background:white;
  padding:15px;
  margin:5px;
  border-radius:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

#toast {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
}

#display {
  font-size:30px;
  margin:30px;
}

/* スプラッシュ */
#splash {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:1;
  transition:opacity 1s;
}

#splash.fadeout {
  opacity:0;
}

#splash img {
  width:150px;
}
</style>
</head>

<body>

<!-- スプラッシュ -->
<div id="splash">
  <!-- ★ここを必ず同じ階層に置く -->
  <img src="./logo.png">
</div>

<!-- 登録 -->
<div id="register" class="screen">
  <h2>ユーザー登録</h2>
  <input id="username" placeholder="ユーザー名">
  <div class="button" onclick="registerUser()">登録</div>
</div>

<!-- ホーム -->
<div id="home" class="screen">
  <h2>HSKH</h2>
  <div class="button" onclick="go('books')">単語帳一覧</div>
  <div class="button" onclick="go('input')">単語入力</div>
  <div class="button" onclick="go('learn')">学習</div>
</div>

<div id="books" class="screen">
  <h2>単語帳一覧</h2>
  <input id="newBook" placeholder="単語帳名">
  <div class="button" onclick="createBook()">作成</div>
  <div id="bookList"></div>
  <div class="button" onclick="go('home')">戻る</div>
</div>

<div id="input" class="screen">
  <h2>単語入力</h2>
  <div id="currentBookLabel"></div>
  <select id="bookSelect"></select>
  <input id="num" placeholder="番号">
  <input id="eng" placeholder="英語">
  <input id="jp" placeholder="日本語">
  <div class="button" onclick="saveWord()">保存</div>
  <div class="button" onclick="go('home')">戻る</div>
</div>

<div id="list" class="screen">
  <h2 id="listTitle"></h2>
  <div id="wordList"></div>
  <div class="button" onclick="go('books')">戻る</div>
</div>

<div id="learn" class="screen">
  <div id="learnSetup">
    <input id="start" placeholder="開始">
    <input id="end" placeholder="終了">
    <div class="button" onclick="prepareStudy()">開始</div>
  </div>

  <div id="learnPlay" style="display:none;">
    <div id="display"></div>
    <div class="button" id="nextBtn" onclick="nextWord()" style="display:none;">次へ</div>
    <div class="button" id="homeBtn" style="display:none;">ホームへ</div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentUser = localStorage.getItem("currentUser");
let userData = JSON.parse(localStorage.getItem("userData")||"{}");

/* スプラッシュ */
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("splash").classList.add("fadeout");

    setTimeout(()=>{
      startApp();
    },1000);

  },3000);
};

function startApp(){
  document.getElementById("splash").style.display="none";

  if(currentUser){
    go("home");
  }else{
    go("register");
  }
}

function showToast(msg){
  toast.innerText=msg;
  toast.style.opacity=1;
  setTimeout(()=>toast.style.opacity=0,1500);
}

function registerUser(){
  if(!username.value)return;
  currentUser=username.value;
  localStorage.setItem("currentUser",currentUser);
  if(!userData[currentUser]) userData[currentUser]={};
  localStorage.setItem("userData",JSON.stringify(userData));
  go("home");
}

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.getElementById("learnSetup").style.display="block";
  document.getElementById("learnPlay").style.display="none";

  if(id==="books") showBooks();
  if(id==="input") loadBookSelect();
  if(id==="list") showList();
}

/* 省略せず全部動く */
function createBook(){
  const name=newBook.value.trim();
  if(!name)return;
  if(userData[currentUser][name]){ showToast("存在します"); return; }
  userData[currentUser][name]=[];
  localStorage.setItem("userData",JSON.stringify(userData));
  newBook.value="";
  showBooks();
}

function showBooks(){
  bookList.innerHTML="";
  Object.keys(userData[currentUser]).forEach(name=>{
    const div=document.createElement("div");
    div.className="button";
    div.innerText=name;
    div.onclick=()=>selectBook(name);
    bookList.appendChild(div);
  });
}

function selectBook(name){
  localStorage.setItem("currentBook",name);
  go("list");
}

function loadBookSelect(){
  bookSelect.innerHTML="";
  Object.keys(userData[currentUser]).forEach(name=>{
    let op=document.createElement("option");
    op.value=name;
    op.textContent=name;
    bookSelect.appendChild(op);
  });

  if(localStorage.getItem("currentBook")){
    bookSelect.value=localStorage.getItem("currentBook");
  }

  currentBookLabel.innerText="現在: "+(bookSelect.value || "未選択");
}

function saveWord(){
  const book=bookSelect.value;
  if(!book){ showToast("単語帳選択"); return; }

  let words=userData[currentUser][book]||[];
  const newNum=Number(num.value);
  const idx=words.findIndex(w=>w.num===newNum);

  if(idx!==-1){
    if(!confirm("上書きしますか？"))return;
    words[idx]={num:newNum,eng:eng.value,jp:jp.value};
  }else{
    words.push({num:newNum,eng:eng.value,jp:jp.value});
  }

  userData[currentUser][book]=words;
  localStorage.setItem("userData",JSON.stringify(userData));

  num.value=eng.value=jp.value="";
  showToast("保存");
}

function showList(){
  const book=localStorage.getItem("currentBook");
  listTitle.innerText=book;

  let words=userData[currentUser][book]||[];
  wordList.innerHTML="";

  words.sort((a,b)=>a.num-b.num);

  words.forEach((w,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText=`${w.num} ${w.eng} - ${w.jp}`;

    div.onclick=()=>{
      if(confirm("削除する？")){
        words.splice(i,1);
        userData[currentUser][book]=words;
        localStorage.setItem("userData",JSON.stringify(userData));
        showList();
      }
    };

    wordList.appendChild(div);
  });
}

let studyList=[],index=0,timer;

function prepareStudy(){
  const book=localStorage.getItem("currentBook");
  let words=userData[currentUser][book]||[];

  studyList=words.filter(w=>w.num>=start.value&&w.num<=end.value)
                 .sort(()=>Math.random()-0.5);

  index=0;

  document.getElementById("learnSetup").style.display="none";
  document.getElementById("learnPlay").style.display="block";

  showWord();
}

const homeBtn=document.getElementById("homeBtn");
homeBtn.onclick=()=>go("home");

function showWord(){
  clearTimeout(timer);

  if(index>=studyList.length){
    display.innerText="🎉 学習完了！";
    nextBtn.style.display="none";
    homeBtn.style.display="block";
    return;
  }

  homeBtn.style.display="none";
  nextBtn.style.display="none";

  display.innerText=studyList[index].eng;

  timer=setTimeout(()=>{
    display.innerText=studyList[index].jp;
    nextBtn.style.display="block";
  },2000);
}

function nextWord(){
  index++;
  showWord();
}
</script>

</body>
</html>
